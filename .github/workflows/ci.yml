name: Build Conda Package

on:
    workflow_call:
        secrets:
            prefix_api_token:
                required: false

        inputs:
            prefix_channel:
                required: false
                type: string
                default: ${{ vars.PREFIX_CHANNEL }}

            working-directory:
                description: |
                  Working directory to use for pixi commands. If specified, pixi will look for manifest files (pixi.toml or pyproject.toml) 
                  in this directory instead of the repository root. Useful for monorepos where pixi projects are in subdirectories.
                required: false
                type: string
                default: "."

            pytest:
                description: "Whether to run `pixi run pytest` before packaging"
                required: false
                type: boolean
                default: true 

        outputs:
            mode:
                description: One of dev|release|tagged-release
                value: ${{ jobs.policy.outputs.mode  }}
            conda_package_path:
                description: local path of the built package file
                value: ${{ jobs.build-conda.outputs.conda_package_path }}

jobs:
    policy:
        runs-on: ubuntu-latest
        outputs:
            # dev|release|tagged-release (tags or main|develop)
            mode: ${{ steps.eval.outputs.mode }}

            # true|false
            push_to_conda: ${{ steps.eval.outputs.push_to_conda }}

            # true|false
            pixi_cache: ${{ steps.eval.outputs.pixi_cache }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - id: eval
              shell: bash
              name: Config
              env:
                  PREFIX_API_KEY: ${{ secrets.prefix_api_token }}
                  WD: ${{ inputs['working-directory'] }}
              run: |
                  mode="dev"
                  push_to_conda="false"
                  pixi_cache="false"

                  if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
                    mode="tagged-release"
                  fi
                  if [[ "$GITHUB_REF_TYPE" == "branch" && "$GITHUB_REF_NAME" == "main" ]]; then
                      mode="release"
                  fi

                  # only push when running on a tag with configured credentials
                  if [[ -n "$PREFIX_API_KEY" && "$mode" == "tagged-release" ]]; then
                     push_to_conda="true"
                  fi

                  # no pixi.lock -- no cache
                  lock_file="${WD}/pixi.lock"
                  echo "Check for $lock_file"
                  if [[ -f "$lock_file" ]]; then
                     echo "Found lock file, enabling cache"
                     pixi_cache="true"
                  fi

                  echo "Resolved config: mode=$mode, push_to_conda=$push_to_conda, pixi_cache=$pixi_cache"

                  echo "mode=$mode" >> "$GITHUB_OUTPUT"
                  echo "push_to_conda=$push_to_conda" >> "$GITHUB_OUTPUT"
                  echo "pixi_cache=$pixi_cache" >> "$GITHUB_OUTPUT"

    build-conda:
        needs: policy
        runs-on: "ubuntu-latest"
        outputs:
            conda_package_path: ${{ steps.conda-package.outputs.path }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install Pixi
              uses: prefix-dev/setup-pixi@v0.9.6
              with:
                  cache: ${{ needs.policy.outputs.pixi_cache }}
                  working-directory: ${{ inputs['working-directory'] }}

            - name: Install rattler-build
              run: |
                  pixi global install rattler-build
                  pixi global list
                  which rattler-build

            - name: Patch version for dev build
              if: ${{ needs.policy.outputs.mode == 'dev' }}
              run: |
                  awk -i inplace -v run="$GITHUB_RUN_NUMBER" '
                    /^[[:space:]]*version[[:space:]]*=/ {
                      sub(/"$/, ".dev" run "\"")
                    }
                    { print }
                  ' pyproject.toml

                  grep -q "\.dev$GITHUB_RUN_NUMBER\"" pyproject.toml \
                    || { echo "Version patch failed" >&2; exit 1; }

            - name: Run Tests
              if: ${{ inputs.pytest == 'true' }}
              run: |
                  if pixi run 2>&1 | grep pytest > /dev/null ; then
                     pixi run pytest
                  else
                     echo "Add pixi task named `pytest` to run tests or disable tests"
                     exit 1
                  fi

            - name: Build Conda Package
              id: conda-package
              run: |
                  if pixi run 2>&1 | grep mkconda > /dev/null ; then
                     pixi run mkconda
                  else
                     pixi publish --target-dir ./dist
                  fi
                  CONDA_PACKAGE_PATH="$(find ./dist -name '*.conda' | head -1)" 
                  echo "path=${CONDA_PACKAGE_PATH}" >> $GITHUB_OUTPUT

            - name: Dump Package Content
              env:
                  CONDA_PACKAGE_PATH: ${{ steps.conda-package.outputs.path }}
              run: |
                  rattler-build package inspect --paths "${CONDA_PACKAGE_PATH}"

            - name: Publish Artifact
              uses: actions/upload-artifact@v7
              with:
                  path: ${{ steps.conda-package.outputs.path }}
                  archive: false

            - name: Upload to prefix.dev
              if: ${{ needs.policy.outputs.push_to_conda == 'true' }}
              env:
                  CONDA_PACKAGE_PATH: ${{ steps.conda-package.outputs.path }}
                  PREFIX_CHANNEL: ${{ inputs.prefix_channel }}
                  PREFIX_API_KEY: ${{ secrets.prefix_api_token }}
              run: |
                  echo "Uploading ${CONDA_PACKAGE_PATH}"
                  pixi upload prefix "${CONDA_PACKAGE_PATH}"
